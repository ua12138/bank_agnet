services:
  postgres:
    image: postgres:16
    container_name: hz-aiops-postgres-secure
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    volumes:
      - pg_secure_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  api:
    image: hz-aiops:${IMAGE_TAG:-latest}
    container_name: hz-aiops-api-secure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HZ_AIOPS_ENV: prod
      HZ_AIOPS_TASK_DB_KIND: postgres
      HZ_AIOPS_POSTGRES_DSN: postgresql://aiops:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/aiops
      HZ_AIOPS_WORKFLOW_ENGINE: langgraph
      HZ_AIOPS_LANGGRAPH_FALLBACK_TO_CLASSIC: "true"
      HZ_AIOPS_ENABLE_DEDUP: "true"
      HZ_AIOPS_ENABLE_HUMAN_APPROVAL: "true"
      HZ_AIOPS_REACT_COT_ENABLED: "false"
      HZ_AIOPS_RAG_MCP_BASE_URL: ${HZ_AIOPS_RAG_MCP_BASE_URL:-http://host.docker.internal:8091}
      HZ_AIOPS_FEISHU_WEBHOOK_URL: ${HZ_AIOPS_FEISHU_WEBHOOK_URL:-}
      HZ_AIOPS_WORKER_ID: diag-worker-1
      HZ_AIOPS_WORKER_POLL_INTERVAL_SEC: "1.0"
    ports:
      - "${API_PORT:-8088}:8088"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5

  worker:
    image: hz-aiops:${IMAGE_TAG:-latest}
    container_name: hz-aiops-worker-secure
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      HZ_AIOPS_ENV: prod
      HZ_AIOPS_TASK_DB_KIND: postgres
      HZ_AIOPS_POSTGRES_DSN: postgresql://aiops:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/aiops
      HZ_AIOPS_WORKFLOW_ENGINE: langgraph
      HZ_AIOPS_LANGGRAPH_FALLBACK_TO_CLASSIC: "true"
      HZ_AIOPS_ENABLE_DEDUP: "true"
      HZ_AIOPS_ENABLE_HUMAN_APPROVAL: "true"
      HZ_AIOPS_REACT_COT_ENABLED: "false"
      HZ_AIOPS_RAG_MCP_BASE_URL: ${HZ_AIOPS_RAG_MCP_BASE_URL:-http://host.docker.internal:8091}
      HZ_AIOPS_FEISHU_WEBHOOK_URL: ${HZ_AIOPS_FEISHU_WEBHOOK_URL:-}
      HZ_AIOPS_WORKER_ID: diag-worker-1
      HZ_AIOPS_WORKER_POLL_INTERVAL_SEC: "1.0"
    command: ["python", "-m", "hz_bank_aiops.worker.runner"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5

volumes:
  pg_secure_data:
